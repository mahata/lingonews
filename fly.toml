# fly.toml app configuration file generated for lingonews on 2026-04-14T15:46:00+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lingonews'
primary_region = 'nrt'
console_command = '/rails/bin/rails console'

[build]

[env]
  RAILS_LOG_TO_STDOUT = 'true'
  RAILS_SERVE_STATIC_FILES = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '120s'
    method = 'GET'
    path = '/up'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
