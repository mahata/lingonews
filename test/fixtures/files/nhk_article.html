      <h1>東京で桜が満開 今年は例年より早い開花</h1>
      <p>東京都内の桜が14日、満開を迎えました。気象庁によると、今年の開花は例年より5日早く、暖冬の影響とみられています。</p>
      <p>上野公園や千鳥ヶ淵では多くの花見客が訪れ、春の訪れを楽しんでいました。外国人観光客の姿も目立ち、桜の写真を撮る人々で賑わいました。</p>
      <p>専門家によると、地球温暖化の影響で桜の開花時期は年々早まっており、今後も同様の傾向が続く可能性があるということです。</p>
