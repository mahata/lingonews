name: News Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update news
    runs-on: ubuntu-latest
    concurrency: news-update
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5

      - name: Run news:update on production
        run: flyctl ssh console -a lingonews -C "bin/rails news:update"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
